<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ title }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->



<header>

<div class="navbar">

<div class="logo">
<img src="/static/images/logo.png" height="40">
<span>MasterDrive Kochi</span>
</div>

<div class="nav-right">
<a href="https://wa.me/917994065904" class="book-btn">
</div>

</div>

</header>

<!-- ================= PAGE CONTENT ================= -->

<main>

{% block content %}

{% endblock %}

</main>


<!-- ================= CHATBOT ================= -->

<!-- ================= CHATBOT SYSTEM ================= -->

<!-- Floating Chat Icon -->
<div id="chat-icon" onclick="toggleChat()">
🤖
</div>

<!-- Chatbot Container -->
<div id="chatbot">

<div id="chat-header">
🤖 MasterDriveKochi AI
<span onclick="toggleChat()" id="close-chat">✕</span>
</div>

<div id="chat-body">

<div class="bot-message">
Hi 👋 Welcome to MasterDrive Kochi.
</div>

<div class="bot-message">
Ask me about pricing, driving sessions, instructors or booking.
</div>

</div>

<div id="chat-footer">

<input type="text" placeholder="Ask something like price, instructor..." />

<a href="https://wa.me/917994065904" target="_blank" class="whatsapp-btn">
📲 Chat on WhatsApp
</a>

</div>

</div>

<!-- ================= FOOTER ================= -->

<footer>

<div class="footer-container">

<p class="address">
📍 Address: Vyttila, Kochi
</p>

<div class="social">

<a href="#">Instagram</a>
<a href="#">Facebook</a>
<a href="#">YouTube</a>

</div>

<p class="copyright">
© MasterDrive Kochi
</p>

</div>

</footer>


<!-- ================= JAVASCRIPT ================= -->

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
