<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ title }}</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="header-container">

<div class="logo">

<img src="{{ url_for('static', filename='images/logo.png') }}" alt="MasterDrive Kochi Logo">

<span>MasterDrive Kochi</span>

</div>

<a href="https://wa.me/917994065904" class="book-btn">
Book Now
</a>

</div>

</header>


<!-- ================= PAGE CONTENT ================= -->

<main>

{% block content %}

{% endblock %}

</main>


<!-- ================= CHATBOT ================= -->

<div id="chatbot">

<div id="chat-header">
MasterDriveKochiAI
</div>

<div id="chat-body">

<div class="bot-message">
Hi 👋 Welcome to MasterDrive Kochi.
</div>

<div class="bot-message">
I can help you with pricing, instructor details, address, session procedure and booking.
</div>

</div>

<input id="chat-input"
type="text"
placeholder="Ask something like price, instructor, address...">

</div>


<!-- ================= FOOTER ================= -->

<footer>

<div class="footer-container">

<p class="address">
📍 Address: Vyttila, Kochi
</p>

<div class="social">

<a href="#">Instagram</a>
<a href="#">Facebook</a>
<a href="#">YouTube</a>

</div>

<p class="copyright">
© MasterDrive Kochi
</p>

</div>

</footer>


<!-- ================= JAVASCRIPT ================= -->

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
